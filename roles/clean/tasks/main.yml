---
- name: Clear colcon log dirs
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  with_items: "{{ clear_colcon_dirs }}"

- name: Create colcon empty log dirs
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: 0775
  with_items: "{{ clear_colcon_dirs }}"
  become: true
  become_user: pi

- name: Create COLCON_IGNORE files
  ansible.builtin.file:
    path: "{{ item }}/COLCON_IGNORE"
    state: touch
    mode: 0664
  with_items: "{{ clear_colcon_dirs }}"
  become: true
  become_user: pi

- name: Clear other dirs
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  with_items: "{{ clear_dirs }}"

- name: Restore firstboot script for final image
  ansible.builtin.copy:
    src: scripts/firstboot.sh
    dest: /boot/firmware/firstboot.sh
    owner: root
    group: root
    mode: '0755'
  become: true

- name: Remove old firstboot done marker
  ansible.builtin.file:
    path: /boot/firmware/firstboot.sh.done
    state: absent
  become: true

- name: Install firstboot service for final image
  ansible.builtin.copy:
    src: systemd/firstboot.service
    dest: /lib/systemd/system/firstboot.service
    owner: root
    group: root
    mode: '0644'
  become: true

- name: Enable firstboot service for next boot
  ansible.builtin.systemd:
    name: firstboot
    enabled: true
    daemon_reload: true
  become: true

# --- Новые задачи для чистоты образа ---

- name: Remove bash history
  ansible.builtin.file:
    path: /home/pi/.bash_history
    state: absent
  become: true

- name: Remove SSH host keys
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/ssh/ssh_host_rsa_key
    - /etc/ssh/ssh_host_rsa_key.pub
    - /etc/ssh/ssh_host_ecdsa_key
    - /etc/ssh/ssh_host_ecdsa_key.pub
    - /etc/ssh/ssh_host_ed25519_key
    - /etc/ssh/ssh_host_ed25519_key.pub
  become: true

- name: Regenerate SSH host keys
  become: true
  ansible.builtin.shell: ssh-keygen -A
  changed_when: false

- name: Restart SSH service
  become: true
  ansible.builtin.systemd:
    name: ssh
    state: restarted

- name: Reset machine-id
  ansible.builtin.shell: |
    echo "" > /etc/machine-id
    rm -f /var/lib/dbus/machine-id
  become: true

- name: Clean apt cache
  ansible.builtin.apt:
    clean: yes
  become: true

- name: Purge remaining old kernels and dependencies
  ansible.builtin.apt:
    autoremove: yes
    purge: yes
  become: true

- name: Shrink systemd journal to 1M
  ansible.builtin.shell: journalctl --vacuum-size=1M --rotate
  become: true
  changed_when: false

# --- Завершающие задачи ---

- name: Flush filesystem buffers
  ansible.builtin.command: sync
  become: true
