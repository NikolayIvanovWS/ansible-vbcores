---
- name: Copy start_ros_nodes.sh to /usr/local/bin
  ansible.builtin.copy:
    src: start_ros_nodes.sh
    dest: /usr/local/bin/start_ros_nodes.sh
    mode: '0755'
    owner: root
    group: root
  become: true
  register: ros_nodes_script

- name: Copy ros_nodes.service to /etc/systemd/system
  ansible.builtin.copy:
    src: ros_nodes.service
    dest: /etc/systemd/system/ros_nodes.service
    mode: '0644'
    owner: root
    group: root
  become: true
  register: ros_nodes_unit

- name: Copy start_camera.sh to /usr/local/bin
  ansible.builtin.copy:
    src: start_camera.sh
    dest: /usr/local/bin/start_camera.sh
    mode: '0755'
    owner: root
    group: root
  become: true
  register: camera_script

- name: Copy camera.service to /etc/systemd/system
  ansible.builtin.copy:
    src: camera.service
    dest: /etc/systemd/system/camera.service
    mode: '0644'
    owner: root
    group: root
  become: true
  register: camera_unit

- name: Update .ros_params
  ansible.builtin.copy:
    src: .ros_params
    dest: /home/pi/.ros_params
    mode: '0644'
    owner: pi
    group: pi
  become: true

- name: Update .bashrc
  ansible.builtin.copy:
    src: .bashrc
    dest: /home/pi/.bashrc
    mode: '0644'
    owner: pi
    group: pi
  become: true

- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: true
  become: true

- name: Enable and start ros_nodes service
  ansible.builtin.systemd:
    name: ros_nodes
    enabled: yes
    state: "{{ 'restarted' if (ros_nodes_script.changed or ros_nodes_unit.changed) else 'started' }}"
  become: true

- name: Enable and start camera service
  ansible.builtin.systemd:
    name: camera
    enabled: yes
    state: "{{ 'restarted' if (camera_script.changed or camera_unit.changed) else 'started' }}"
  become: true

- name: Flush filesystem buffers
  ansible.builtin.command: sync
  become: true

- name: Reboot host
  ansible.builtin.reboot:
    reboot_timeout: 600
  become: true
