---
- name: Install required apt packages
  become: true
  ansible.builtin.apt:
    name:
      - curl
      - wget
      - apt-transport-https
    state: present
    update_cache: true

- name: Download code-server installer
  ansible.builtin.get_url:
    url: https://code-server.dev/install.sh
    dest: /tmp/code-server-install.sh
    mode: '0755'

- name: Install code-server from internet
  become: true
  ansible.builtin.command: /bin/sh /tmp/code-server-install.sh
  args:
    creates: /usr/bin/code-server

- name: Check code-server version
  ansible.builtin.command: code-server --version
  register: code_server_version
  changed_when: false

- name: Ensure code-server config directory exists
  ansible.builtin.file:
    path: /home/pi/.config/code-server
    state: directory
    mode: '0755'
    owner: pi
    group: pi

- name: Copy code-server config.yaml
  ansible.builtin.copy:
    src: config.yaml
    dest: /home/pi/.config/code-server/config.yaml
    mode: '0644'
    owner: pi
    group: pi

- name: Enable and start code-server service for user pi
  become: true
  ansible.builtin.systemd:
    name: code-server@pi
    enabled: true
    state: started

- name: Allow code-server port in UFW
  become: true
  community.general.ufw:
    rule: allow
    port: '8090'
    proto: tcp

- name: Get installed code-server extensions
  ansible.builtin.command: code-server --list-extensions
  become: true
  become_user: pi
  register: code_server_extensions
  changed_when: false

- name: Install VS Code extensions via code-server CLI
  ansible.builtin.command: "code-server --install-extension {{ item }}"
  become: true
  become_user: pi
  loop:
    - ms-python.python
  when: item not in code_server_extensions.stdout_lines

- name: Download Pylance extension from Visual Studio Marketplace
  ansible.builtin.get_url:
    url: https://marketplace.visualstudio.com/_apis/public/gallery/publishers/ms-python/vsextensions/vscode-pylance/latest/vspackage
    dest: /tmp/vscode-pylance.vsix
    mode: '0644'
  when: "'ms-python.vscode-pylance' not in code_server_extensions.stdout_lines"

- name: Install Pylance extension from VSIX
  ansible.builtin.command: code-server --install-extension /tmp/vscode-pylance.vsix
  become: true
  become_user: pi
  when: "'ms-python.vscode-pylance' not in code_server_extensions.stdout_lines"

- name: Ensure code-server User settings directory exists
  ansible.builtin.file:
    path: /home/pi/.local/share/code-server/User
    state: directory
    mode: '0755'
    owner: pi
    group: pi

- name: Copy VS Code settings.json
  ansible.builtin.copy:
    src: settings.json
    dest: /home/pi/.local/share/code-server/User/settings.json
    mode: '0644'
    owner: pi
    group: pi

- name: Flush filesystem buffers
  ansible.builtin.command: sync
  become: true

- name: Reboot host
  ansible.builtin.reboot:
    reboot_timeout: 600
  become: true
