- name: Install dnsmasq
  ansible.builtin.apt:
    name: dnsmasq
    state: present
    update_cache: true

- name: Stop and disable default dnsmasq service
  ansible.builtin.systemd:
    name: dnsmasq
    state: stopped
    enabled: false
    masked: true

- name: Gather service facts for fallback handlers
  ansible.builtin.service_facts:


