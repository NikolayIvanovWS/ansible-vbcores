- name: netplan apply
  ansible.builtin.command:
    cmd: netplan apply
  changed_when: true

- name: systemd daemon-reload
  ansible.builtin.systemd:
    daemon_reload: true

- name: restart network-fallback
  ansible.builtin.systemd:
    name: network-fallback
    state: restarted

- name: restart dnsmasq-fallback
  ansible.builtin.systemd:
    name: dnsmasq-fallback
    state: restarted
  when: >
    (ansible_facts.services | default({})).get(
      'dnsmasq-fallback.service', {}
    ).get('state', '') == 'running'
  failed_when: false
